name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  BUILD_OUTPUT_DIR: web/out
  HASHED_ASSETS_PATTERN: '_next/static/*'
  IMMUTABLE_CACHE_CONTROL: 'public, max-age=31536000, immutable'
  REVALIDATE_CACHE_CONTROL: 'public, max-age=60, must-revalidate'
  INVALIDATION_PATHS: '/*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build static export
        working-directory: web
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-${{ github.run_id }}

      - name: Upload hashed assets with immutable cache
        run: |
          aws s3 sync "$BUILD_OUTPUT_DIR/" "s3://$BUCKET/" \
            --delete \
            --exclude "*" \
            --include "$HASHED_ASSETS_PATTERN" \
            --cache-control "$IMMUTABLE_CACHE_CONTROL"
        env:
          BUCKET: ${{ vars.SITE_BUCKET_NAME }}

      - name: Upload remaining assets with short cache
        run: |
          aws s3 sync "$BUILD_OUTPUT_DIR/" "s3://$BUCKET/" \
            --delete \
            --exclude "$HASHED_ASSETS_PATTERN" \
            --exclude "$EXTERNAL_ASSET_RESUME" \
            --cache-control "$REVALIDATE_CACHE_CONTROL"
        env:
          BUCKET: ${{ vars.SITE_BUCKET_NAME }}
          EXTERNAL_ASSET_RESUME: resume.pdf

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "$INVALIDATION_PATHS"
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

      - name: Deployment summary
        run: |
          {
            echo "### Deployed"
            echo "- Bucket: \`${{ vars.SITE_BUCKET_NAME }}\`"
            echo "- Distribution: \`${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
